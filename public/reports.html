<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>বিক্রয় রিপোর্ট - মুদি দোকান</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css?v=1.0.2">
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background-color: #f4f7f6; padding-bottom: 80px; }
        header { background: #2c3e50; color: white; padding: 15px; text-align: center; position: sticky; top: 0; z-index: 1000; }
        .container { padding: 15px; max-width: 800px; margin: auto; }

        /* তারিখ বাটনের স্টাইল */
        .date-btn { 
            background: white; padding: 15px; border-radius: 12px; margin-bottom: 10px;
            display: flex; justify-content: space-between; align-items: center;
            cursor: pointer; border-left: 5px solid #3498db; box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .date-btn:hover { background: #ebf5fb; }

        /* ইনভয়েস লিস্ট স্টাইল */
        .invoice-item { 
            background: #fff; padding: 12px; border-radius: 8px; margin-bottom: 8px;
            display: flex; justify-content: space-between; align-items: center;
            border: 1px solid #ddd; cursor: pointer;
        }

        /* মোবাইল ফ্রেন্ডলি মেমো মডাল */
        #invoiceModal { 
            display:none; position:fixed; top:0; left:0; width:100%; height:100%; 
            background:rgba(0,0,0,0.8); z-index:2000; align-items:center; justify-content:center; 
        }
        #memoContent { 
            background:white; width:95%; max-width:400px; padding:15px; border-radius:15px; 
            max-height: 90vh; overflow-y: auto; /* মোবাইলে স্ক্রল করার জন্য */
            box-sizing: border-box; font-family: 'Courier New', monospace;
        }
        
        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        th, td { padding: 8px 2px; text-align: left; font-size: 0.85rem; border-bottom: 1px solid #eee; word-break: break-all; }

        /* নিচতলার সামারি বার */
        .day-summary-bar { 
            position: fixed; bottom: 0; left: 0; right: 0; background: #2ecc71; 
            color: white; padding: 12px; display: flex; justify-content: space-around;
            font-weight: bold; text-align: center; font-size: 0.85rem; box-shadow: 0 -4px 10px rgba(0,0,0,0.1);
        }

        .hidden { display: none; }
        .back-link { color: white; text-decoration: none; float: left; }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="back-link"><i class="fa-solid fa-arrow-left"></i></a>
    <span>বিক্রয় রিপোর্ট</span>
</header>

<div class="container">
    <!-- ১. তারিখের লিস্ট এখানে দেখাবে -->
    <div id="dateListView"></div>

    <!-- ২. কোনো তারিখে ক্লিক করলে ইনভয়েস লিস্ট এখানে দেখাবে -->
    <div id="invoiceListView" class="hidden">
        <button onclick="backToDates()" style="margin-bottom:15px; padding:8px 15px; border-radius:5px; border:none; background:#95a5a6; color:white; cursor:pointer;"><i class="fa-solid fa-arrow-left"></i> তারিখ লিস্টে ফিরুন</button>
        <h3 id="selectedDateTitle"></h3>
        <div id="invoiceContainer"></div>
    </div>
</div>

<!-- মেমো পপআপ (মোবাইল ফিক্সড) -->
<div id="invoiceModal">
    <div id="memoContent">
        <div style="text-align:center; border-bottom: 1px dashed #333; padding-bottom: 10px;">
            <h3 style="margin:0;">ক্যাশ মেমো</h3>
            <p id="mCustName" style="margin:5px 0; font-weight:bold;"></p>
            <small id="mDate"></small>
        </div>
        <table>
            <thead>
                <tr>
                    <th style="width:40%">মাল</th>
                    <th style="width:20%; text-align:center;">পরিমাণ</th>
                    <th style="width:40%; text-align:right;">দাম</th>
                </tr>
            </thead>
            <tbody id="mItems"></tbody>
        </table>
        <div style="margin-top:10px; border-top: 1px dashed #333; padding-top:10px;">
            <div style="display:flex; justify-content:space-between;"><span>মোট:</span> <b id="mTotal"></b></div>
            <div style="display:flex; justify-content:space-between; color:green;"><span>জমা:</span> <span id="mPaid"></span></div>
            <div style="display:flex; justify-content:space-between; color:red;"><span>বাকি:</span> <span id="mDue"></span></div>
        </div>
        <div style="display:flex; gap:10px; margin-top:20px;" class="no-print">
            <button onclick="deleteMemo()" style="flex:1; padding:10px; background:#e74c3c; color:white; border:none; border-radius:5px; cursor:pointer;">ডিলিট</button>
            <button onclick="window.print()" style="flex:1; padding:10px; background:#3498db; color:white; border:none; border-radius:5px; cursor:pointer;">প্রিন্ট</button>
            <button onclick="closeModal()" style="flex:1; padding:10px; background:#95a5a6; color:white; border:none; border-radius:5px; cursor:pointer;">বন্ধ</button>
        </div>
    </div>
</div>

<!-- নিচে সামারি বার (যখন কোনো দিন সিলেক্ট করবেন তখন আসবে) -->
<div id="summaryBar" class="day-summary-bar hidden">
    <div>বিক্রি<br><span id="sTotal">০</span></div>
    <div>লাভ<br><span id="sProfit">০</span></div>
    <div>আইটেম<br><span id="sQty">০</span></div>
</div>

<script src="js/reports.js?v=1.0.2"></script>
</body>
</html>
