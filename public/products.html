<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>পণ্য ক্রয় / স্টক ইন - মুদি দোকান</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --primary: #3498db; --dark: #2c3e50; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background-color: var(--bg); color: #333; }
        
        header { background: var(--dark); color: white; padding: 12px 15px; display: flex; align-items: center; gap: 10px; position: sticky; top: 0; z-index: 1000; }
        header a { color: white; text-decoration: none; font-size: 1.1rem; }

        .purchase-container { max-width: 900px; margin: 10px auto; padding: 0 10px; padding-bottom: 100px; }

        /* টপ কন্ট্রোল বক্স */
        .card-box { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 12px; }
        
        .barcode-row { display: flex; gap: 8px; align-items: center; }
        .barcode-row input { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 1rem; outline: none; }
        .scan-icon { font-size: 1.4rem; color: var(--primary); cursor: pointer; padding: 10px; background: #ebf5fb; border-radius: 8px; }

        .qty-mode-row { margin-top: 12px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; }
        .qty-box { display: flex; align-items: center; gap: 8px; }
        .qty-box input { width: 80px; padding: 10px; border: 1px solid #ddd; border-radius: 8px; text-align: center; }
        
        .mode-selection { display: flex; gap: 8px; }
        .mode-btn { padding: 8px 15px; border-radius: 6px; border: 1px solid #ddd; cursor: pointer; font-weight: bold; font-size: 0.85rem; }
        .mode-btn.active { background: var(--primary); color: white; border-color: var(--primary); }

        /* ইনভয়েস টেবিল (মোবাইল স্ক্রল সাপোর্ট) */
        .table-container { background: white; border-radius: 12px; overflow-x: auto; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        table { width: 100%; border-collapse: collapse; min-width: 500px; } /* টেবিল ছোট হয়ে যাওয়া বন্ধ করবে */
        th { background: #f8f9fa; padding: 12px 8px; text-align: left; font-size: 0.8rem; color: #7f8c8d; border-bottom: 2px solid #eee; }
        td { padding: 10px 8px; border-bottom: 1px solid #f9f9f9; font-size: 0.9rem; }
        
        .table-input { width: 60px; padding: 6px; border: 1px solid #eee; border-radius: 5px; text-align: center; font-size: 0.9rem; }

        /* ফুটার: মোবাইল এর জন্য ফিক্সড */
        .footer-total { 
            position: fixed; bottom: 0; left: 0; right: 0; 
            background: white; padding: 15px 20px; 
            border-top: 2px solid #eee; display: flex; 
            justify-content: space-between; align-items: center; 
            box-shadow: 0 -4px 10px rgba(0,0,0,0.1); 
            z-index: 1000;
        }
        .btn-save { background: var(--primary); color: white; padding: 12px 25px; border: none; border-radius: 8px; font-size: 1rem; font-weight: bold; cursor: pointer; }
        .total-info { text-align: right; }
        .total-info small { color: #888; font-size: 0.8rem; }
        .total-amount { font-size: 1.6rem; font-weight: bold; color: var(--primary); margin: 0; }

        /* ক্যামেরা মডাল */
        #scanner-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; align-items: center; justify-content: center; flex-direction: column; }
        #reader { width: 300px; background: white; border-radius: 10px; overflow: hidden; }
        .close-scanner { color: white; margin-top: 20px; cursor: pointer; border: 1px solid white; padding: 10px 20px; border-radius: 5px; }

        #suggestions { position: absolute; top: 65px; left: 15px; right: 15px; background: white; border: 1px solid #ddd; z-index: 100; border-radius: 8px; display: none; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .sug-item { padding: 12px; border-bottom: 1px solid #eee; cursor: pointer; }
    </style>
</head>
<body>

<header>
    <a href="index.html"><i class="fa-solid fa-arrow-left"></i></a>
    <span style="font-weight: bold;">পণ্য ক্রয় / স্টক ইন</span>
</header>

<div class="purchase-container">
    <!-- পণ্য খোঁজা -->
    <div class="card-box" style="position: relative;">
        <div class="barcode-row">
            <input type="text" id="barcodeInput" placeholder="বারকোড বা নাম লিখুন..." autocomplete="off">
            <i class="fa-solid fa-camera scan-icon" onclick="openScanner()"></i>
        </div>
        <div id="suggestions"></div>

        <div class="qty-mode-row">
            <div class="qty-box">
                <span style="font-size: 0.85rem; color: #666;">পরিমাণ:</span>
                <input type="number" id="qtyInput" value="1" min="1">
            </div>
            <div class="mode-selection">
                <div id="cashBtn" class="mode-btn active" onclick="setMode('cash')">Cash</div>
                <div id="creditBtn" class="mode-btn" onclick="setMode('credit')">Credit</div>
            </div>
        </div>
    </div>

    <!-- কোম্পানি -->
    <div class="card-box">
        <label style="font-size: 0.8rem; font-weight: bold; color: #555;">সাপ্লায়ার / কোম্পানি</label>
        <select id="companySelect" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; margin-top: 5px;"></select>
    </div>

    <!-- ইনভয়েস টেবিল -->
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>পণ্যের নাম</th>
                    <th style="text-align:center;">কেনা</th>
                    <th style="text-align:center;">বেচা</th>
                    <th style="text-align:center;">পরিমাণ</th>
                </tr>
            </thead>
            <tbody id="purchaseBody">
                <!-- এখানে ডাটা আসবে -->
            </tbody>
        </table>
    </div>
</div>

<!-- ফুটার -->
<div class="footer-total">
    <button class="btn-save" id="saveBtn" onclick="savePurchase()">সেভ করুন</button>
    <div class="total-info">
        <small>মোট ক্রয় মূল্য</small>
        <p class="total-amount" id="grandTotal">৳ ০</p>
    </div>
</div>

<!-- স্ক্যানার মডাল -->
<div id="scanner-modal">
    <div id="reader"></div>
    <div class="close-scanner" onclick="closeScanner()">বন্ধ করুন</div>
</div>

<script src="js/products.js"></script>
</body>
</html>
