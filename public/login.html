<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>লগইন - মুদি দোকান</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css?v=1.0.2">
    <style>
        body { font-family: sans-serif; background: #2c3e50; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 40px; border-radius: 20px; width: 320px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        h2 { text-align: center; color: #2c3e50; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #27ae60; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        p { text-align: center; font-size: 0.9rem; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>দোকান লগইন</h2>
        <form id="loginForm">
            <input type="text" id="user" placeholder="ইউজার নেম" required>
            <input type="password" id="pass" placeholder="পাসওয়ার্ড" required>
            <button type="submit">প্রবেশ করুন</button>
        </form>
        <p>নতুন দোকান? <a href="register.html" style="color:#27ae60; font-weight:bold; text-decoration:none;">অ্যাকাউন্ট খুলুন</a></p>
       <!-- হেল্প সেকশন আপডেট করা হলো -->
       <div style="margin-top: 30px; border-top: 1px solid #eee; padding-top: 15px; text-align: center;">
            <p style="font-size: 0.85rem; color: #7f8c8d; margin-bottom: 10px;">লগইন করতে সমস্যা হচ্ছে?</p>
    
            <!-- হোয়াটসঅ্যাপ বাটন (সরাসরি API লিঙ্ক) -->
            <a href="https://api.whatsapp.com/send?phone=0096898136033&text=%E0%A6%86%E0%A6%B8%E0%A6%B8%E0%A6%BE%E0%A6%B2%E0%A6%BE%E0%A6%AE%E0%A7%81%20%E0%A6%86%E0%A6%B2%E0%A6%BE%E0%A6%87%E0%A6%95%E0%A7%81%E0%A6%AE%2C%20%E0%A6%86%E0%A6%AE%E0%A6%BF%20%E0%A6%86%E0%A6%AE%E0%A6%BE%E0%A6%B0%20%E0%A6%A6%E0%A7%8B%E0%A6%95%E0%A6%BE%E0%A6%A8%E0%A7%87%E0%A6%B0%20%E0%A6%AA%E0%A6%BE%E0%A6%B8%E0%A6%BE%E0%A6%83%20%E0%A6%AC%E0%A6%BE%20%E0%A6%87%E0%A6%89%E0%A6%9C%E0%A6%BE%E0%A6%B0%20%E0%A6%AD%E0%A7%81%E0%A6%B2%E0%A7%87%20%E0%A6%97%E0%A7%87%E0%A6%9B%E0%A6%BF%E0%A7%A4" 
                target="_blank" 
                style="display: inline-flex; align-items: center; gap: 8px; background: #25D366; color: white; padding: 10px 20px; border-radius: 50px; text-decoration: none; font-weight: bold; font-size: 0.9rem; box-shadow: 0 4px 10px rgba(37, 211, 102, 0.3); transition: 0.3s;">
                <i class="fa-brands fa-whatsapp" style="font-size: 1.3rem;"></i> 
                সরাসরি হেল্প নিন
            </a>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const res = await fetch('/api/auth/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    username: document.getElementById('user').value,
                    password: document.getElementById('pass').value
                })
            });
            const result = await res.json();
            if (res.ok) window.location.href = 'index.html';
            else alert(result.msg);
        });
    </script>
</body>
</html>
