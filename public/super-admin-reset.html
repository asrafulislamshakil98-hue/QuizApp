<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>পাসওয়ার্ড রিসেট কেন্দ্র</title>
    <style>
        body { font-family: sans-serif; background: #2c3e50; color: white; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { background: white; color: #333; padding: 30px; border-radius: 15px; width: 350px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #d35400; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <h2 style="text-align:center; color:#d35400;">ইউজার পাসওয়ার্ড রিসেট</h2>
        <form id="resetForm">
            <input type="text" id="targetUser" placeholder="ইউজারের ইউজার নেম" required>
            <input type="text" id="newPass" placeholder="নতুন পাসওয়ার্ড (যেমন: 123456)" required>
            <input type="password" id="masterKey" placeholder="আপনার মাস্টার সিক্রেট কি" required>
            <button type="submit" id="resetBtn">পাসওয়ার্ড বদলে দিন</button>
        </form>
    </div>

    <script>
        document.getElementById('resetForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('resetBtn');
            btn.innerText = "প্রসেসিং...";
            
            const data = {
                targetUsername: document.getElementById('targetUser').value,
                newPassword: document.getElementById('newPass').value,
                masterSecret: document.getElementById('masterKey').value
            };

            const res = await fetch('/api/auth/super-admin/reset-user-password', {
                method: 'PUT',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });

            const result = await res.json();
            alert(result.msg);
            btn.innerText = "পাসওয়ার্ড বদলে দিন";
            if(res.ok) location.reload();
        });
    </script>
</body>
</html>
