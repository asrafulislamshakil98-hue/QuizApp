<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POS - আধুনিক বিক্রয় কেন্দ্র</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- বারকোড স্ক্যানার লাইব্রেরি -->
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background-color: #f4f7f6; }
        header { background: #27ae60; color: white; padding: 10px 20px; display: flex; align-items: center; justify-content: space-between; }
        
        .pos-container { max-width: 800px; margin: 15px auto; padding: 0 10px; }

        /* কন্ট্রোল সেকশন */
        .control-panel { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 15px; }
        
        /* বারকোড বক্স ও ক্যামেরা আইকন */
        .barcode-row { display: flex; gap: 10px; align-items: center; position: relative; }
        .barcode-row input { flex: 1; padding: 15px; border: 1px solid #ddd; border-radius: 10px; font-size: 1.1rem; }
        .scan-icon { font-size: 1.5rem; color: #27ae60; cursor: pointer; padding: 10px; background: #f0fff4; border-radius: 10px; }

        /* সংখ্যার বক্স (বারকোডের নিচে) */
        .qty-row { margin-top: 15px; display: flex; align-items: center; gap: 10px; }
        .qty-row input { width: 100px; padding: 10px; border: 1px solid #ddd; border-radius: 8px; text-align: center; font-size: 1rem; }
        
        /* মোড বাটন (Cash/Credit) */
        .mode-selection { margin-left: auto; display: flex; gap: 10px; }
        .mode-icon { padding: 10px 15px; border-radius: 8px; border: 1px solid #ddd; cursor: pointer; text-align: center; min-width: 60px; }
        .mode-icon.active { background: #27ae60; color: white; border-color: #27ae60; }

        /* ইনভয়েস টেবিল */
        .invoice-card { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        table { width: 100%; border-collapse: collapse; }
        th { background: #f8f9fa; padding: 15px; text-align: left; color: #7f8c8d; border-bottom: 2px solid #eee; }
        td { padding: 15px; border-bottom: 1px solid #f9f9f9; }

        /* ফুটার: বাটন বামে, টোটাল ডানে */
        .footer-total { padding: 25px; background: #fff; border-top: 2px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        .btn-complete { background: #27ae60; color: white; padding: 15px 35px; border: none; border-radius: 10px; font-size: 1.2rem; font-weight: bold; cursor: pointer; order: 1; }
        .total-info { text-align: right; order: 2; }
        .total-amount { font-size: 2.2rem; font-weight: bold; color: #27ae60; margin: 0; }

        /* ক্যামেরা মডাল */
        #scanner-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center; flex-direction: column; }
        #reader { width: 300px; background: white; border-radius: 10px; overflow: hidden; }
        .close-scanner { color: white; margin-top: 20px; cursor: pointer; font-weight: bold; border: 1px solid white; padding: 10px 20px; border-radius: 5px; }

        #suggestions { position: absolute; top: 60px; left: 0; width: 85%; background: white; border: 1px solid #ddd; z-index: 100; border-radius: 8px; display: none; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .sug-item { padding: 12px; border-bottom: 1px solid #eee; cursor: pointer; }
    </style>
</head>
<body>

<header>
    <a href="index.html"><i class="fa-solid fa-arrow-left"></i></a>
    <span><i class="fa-solid fa-cash-register"></i> POS - বিক্রয় কেন্দ্র</span>
    <div></div>
</header>

<div class="pos-container">
    <div class="control-panel">
        <!-- বারকোড ও ক্যামেরা আইকন -->
        <div class="barcode-row">
            <input type="text" id="barcodeInput" placeholder="বারকোড স্ক্যান করুন বা নাম লিখুন..." autocomplete="off">
            <i class="fa-solid fa-camera scan-icon" onclick="openScanner()" title="ক্যামেরা স্ক্যানার"></i>
            <div id="suggestions"></div>
        </div>

        <!-- সংখ্যার বক্স ও মোড বাটন (নিচে) -->
        <div class="qty-row">
            <div>
                <label style="font-size: 0.8rem; display: block; color: #888;">পরিমাণ</label>
                <input type="number" id="qtyInput" value="1" min="1">
            </div>
            
            <div class="mode-selection">
                <div id="cashBtn" class="mode-icon active" onclick="setMode('cash')">
                    <i class="fa-solid fa-money-bill-1"></i><br>Cash
                </div>
                <div id="creditBtn" class="mode-icon" onclick="setMode('credit')">
                    <i class="fa-solid fa-user-clock"></i><br>Credit
                </div>
            </div>
        </div>
    </div>

    <div id="prevDueBox" style="display:none; background:#fff5f5; padding:10px; border-radius:8px; margin-bottom:10px; border:1px solid #feb2b2; color:#c53030; font-size:0.95rem;">
        <i class="fa-solid fa-circle-info"></i> আগের মোট বাকি: <b id="prevDueAmount">৳ ০</b>
    </div>

    <!-- কাস্টমার সেকশন (বাকি হলে আসবে) -->
    <div id="customerBox" style="display: none; background: #fff; padding: 15px; border-radius: 10px; margin-bottom: 15px; border-left: 5px solid #e67e22;">
        <select id="customerSelect" style="width: 100%; padding: 10px; border-radius: 5px;"></select>
        <input type="number" id="paidAmount" placeholder="জমা টাকা (যদি দেয়)" style="width: 100%; padding: 10px; margin-top: 10px; border: 1px solid #ddd; border-radius: 5px;">
    </div>

    <!-- ইনভয়েস টেবিল -->
    <div class="invoice-card">
        <table>
            <thead>
                <tr>
                    <th>বারকোড</th>
                    <th>পণ্যের নাম</th>
                    <th>পরিমাণ</th>
                    <th style="text-align:right">দাম</th>
                </tr>
            </thead>
            <tbody id="invoiceBody"></tbody>
        </table>
        
        <div class="footer-total">
            <button class="btn-complete" onclick="processSale()">বিক্রি সম্পন্ন</button>
            <div class="total-info">
                <small>মোট বিল</small>
                <p class="total-amount" id="grandTotal">৳ ০</p>
            </div>
        </div>
    </div>
</div>

<!-- ক্যামেরা স্ক্যানার মডাল -->
<div id="scanner-modal">
    <div id="reader"></div>
    <div class="close-scanner" onclick="closeScanner()">বন্ধ করুন</div>
</div>

<!-- ফাইনাল চেকআউট মডাল -->
<div id="checkoutModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:2000; align-items:center; justify-content:center; backdrop-filter: blur(5px);">
    <div style="background:white; width:95%; max-width:400px; padding:25px; border-radius:20px; box-shadow: 0 10px 30px rgba(0,0,0,0.3);">
        <h2 style="text-align:center; margin-top:0; color:#27ae60;">ফাইনাল পেমেন্ট</h2>
        
        <div style="background:#f9f9f9; padding:15px; border-radius:10px; margin-bottom:15px;">
            <div style="display:flex; justify-content:space-between; font-size:1.1rem; margin-bottom:8px;">
                <span>মোট বিল:</span> <b id="modalTotal">৳ ০</b>
            </div>
            
            <div style="margin-bottom:12px;">
                <label style="font-size:0.8rem; color:#666;">ডিসকাউন্ট (টাকা)</label>
                <input type="number" id="discountInput" value="0" oninput="calculateFinal()" style="width:100%; padding:10px; border:1px solid #ddd; border-radius:5px; box-sizing:border-box; font-size:1.1rem;">
            </div>

            <div style="display:flex; justify-content:space-between; font-size:1.3rem; color:#2c3e50; font-weight:bold; border-top:1px solid #ddd; padding-top:10px;">
                <span>নিট বিল:</span> <span id="netBill">৳ ০</span>
            </div>
        </div>

        <div style="margin-bottom:15px;">
            <label id="paidLabel" style="font-size:0.8rem; color:#666;">কাস্টমার কত টাকা দিলো?</label>
            <input type="number" id="modalPaidInput" oninput="calculateFinal()" style="width:100%; padding:12px; border:2px solid #27ae60; border-radius:8px; box-sizing:border-box; font-size:1.3rem; font-weight:bold;">
        </div>

        <div id="returnSection" style="text-align:center; padding:10px; border-radius:8px; background:#fff9e6; margin-bottom:20px;">
            <span id="returnText" style="font-size:0.9rem; color:#d35400;">কাস্টমার ফেরত পাবে</span>
            <div id="modalChangeAmount" style="font-size:1.8rem; font-weight:bold; color:#e67e22;">৳ ০</div>
        </div>

        <!-- ৩টি বাটন -->
        <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:10px;">
            <button onclick="closeCheckout()" style="padding:12px; background:#dfe6e9; border:none; border-radius:8px; cursor:pointer; font-weight:bold;">পিছনে</button>
            <button onclick="window.print()" style="padding:12px; background:#3498db; color:white; border:none; border-radius:8px; cursor:pointer; font-weight:bold;"><i class="fa-solid fa-print"></i> প্রিন্ট</button>
            <button onclick="submitFinalSale()" id="finalBtn" style="padding:12px; background:#27ae60; color:white; border:none; border-radius:8px; cursor:pointer; font-weight:bold;">বিক্রি সম্পন্ন</button>
        </div>
    </div>
</div>

<script src="js/pos.js"></script>
</body>
</html>
